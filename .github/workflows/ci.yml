name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Test
        run: go test -v -race ./...

      - name: Build
        run: go build -o bin/gitdig ./cmd/gitdig

      - name: Verify
        run: ./bin/gitdig --version

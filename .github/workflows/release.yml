name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist

          platforms=("darwin/amd64" "darwin/arm64" "linux/amd64" "linux/arm64" "windows/amd64" "windows/arm64")

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/gitdig_${GOOS}_${GOARCH}"

            if [ "$GOOS" = "windows" ]; then
              output="${output}.exe"
            fi

            echo "Building $GOOS/$GOARCH..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w" -o "$output" ./cmd/gitdig
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"

          cd npm/gitdig
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ../..

          declare -A PLATFORMS=(
            ["darwin-arm64"]="darwin_arm64"
            ["darwin-x64"]="darwin_amd64"
            ["linux-arm64"]="linux_arm64"
            ["linux-x64"]="linux_amd64"
            ["win32-arm64"]="windows_arm64"
            ["win32-x64"]="windows_amd64"
          )

          for npm_platform in "${!PLATFORMS[@]}"; do
            go_platform="${PLATFORMS[$npm_platform]}"
            pkg_dir="npm/@gitdig/$npm_platform"

            mkdir -p "$pkg_dir/bin"

            if [[ "$npm_platform" == win32* ]]; then
              binary="gitdig.exe"
              src="dist/gitdig_${go_platform}.exe"
            else
              binary="gitdig"
              src="dist/gitdig_${go_platform}"
            fi

            if [ -f "$src" ]; then
              cp "$src" "$pkg_dir/bin/$binary"
              chmod +x "$pkg_dir/bin/$binary"
            fi

            os="${npm_platform%-*}"
            cpu="${npm_platform#*-}"

            cat > "$pkg_dir/package.json" <<EOF
          {
            "name": "@gitdig/$npm_platform",
            "version": "$VERSION",
            "description": "GitDig binary for $npm_platform",
            "repository": "https://github.com/rishabnotfound/GitDig",
            "license": "MIT",
            "os": ["$os"],
            "cpu": ["$cpu"],
            "files": ["bin"]
          }
          EOF
          done

      - name: Publish platform packages
        run: |
          for dir in npm/@gitdig/*/; do
            if [ -d "$dir" ]; then
              cd "$dir"
              npm publish --access public || true
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: npm/gitdig
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

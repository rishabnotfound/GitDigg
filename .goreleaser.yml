version: 2

project_name: gitdig

before:
  hooks:
    - go mod tidy

builds:
  - id: gitdig
    main: ./cmd/gitdig
    binary: gitdig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/rishabnotfound/gitdig/internal/version.Version={{.Version}}
      - -X github.com/rishabnotfound/gitdig/internal/version.Commit={{.Commit}}
      - -X github.com/rishabnotfound/gitdig/internal/version.Date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: rishabnotfound
    name: GitDig
  prerelease: auto
  draft: false
  name_template: "v{{.Version}}"
